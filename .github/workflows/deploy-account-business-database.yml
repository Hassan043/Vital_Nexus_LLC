name: Deploy Account Business Database

on:
  workflow_dispatch:
    inputs:
      environment:
        description: Target environment
        required: true
        type: choice
        options:
          - dev
          - test
          - prod
      dacpac_workflow_run_id:
        description: Optional workflow run ID to deploy pre-built DACPAC artifacts (leave empty to build from source)
        required: false
        type: string

permissions:
  contents: read
  actions: read

env:
  RESOURCE_GROUP: rg-vitalnexus-${{ github.event.inputs.environment }}
  SQL_PROJECT: database/VitalNexus.AccountBusiness.Database/VitalNexus.AccountBusiness.Database.sqlproj
  PROJECT_NAME: VitalNexus.AccountBusiness.Database
  TARGET_DATABASE: Accounts
  DACPAC_OUTPUT_DIR: database/artifacts/dacpacs

jobs:
  deploy:
    name: Deploy Account Business to ${{ github.event.inputs.environment }}
    runs-on: ubuntu-latest
    environment: ${{ github.event.inputs.environment }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Download pre-built DACPAC artifacts
        if: github.event.inputs.dacpac_workflow_run_id != ''
        uses: actions/download-artifact@v4
        with:
          name: vitalnexus-dacpac-artifacts
          run-id: ${{ github.event.inputs.dacpac_workflow_run_id }}
          github-token: ${{ secrets.GITHUB_TOKEN }}
          path: ${{ env.DACPAC_OUTPUT_DIR }}

      - name: Setup .NET SDK
        if: github.event.inputs.dacpac_workflow_run_id == ''
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      - name: Build Account Business DACPAC from source
        if: github.event.inputs.dacpac_workflow_run_id == ''
        run: |
          set -euo pipefail
          dotnet build "${{ env.SQL_PROJECT }}" --configuration Release
          mkdir -p "${{ env.DACPAC_OUTPUT_DIR }}"
          dacpac=$(find "$(dirname "${{ env.SQL_PROJECT }}")/bin/Release" -name '*.dacpac' -print -quit)
          cp "$dacpac" "${{ env.DACPAC_OUTPUT_DIR }}/${{ env.PROJECT_NAME }}.dacpac"

      - name: Verify Account Business DACPAC
        run: |
          set -euo pipefail
          dacpac="${{ env.DACPAC_OUTPUT_DIR }}/${{ env.PROJECT_NAME }}.dacpac"
          if [ ! -f "$dacpac" ]; then
            echo "Missing Account Business DACPAC at $dacpac"
            exit 1
          fi
          unzip -t "$dacpac"
          echo "Account Business DACPAC verified: $dacpac"

      - name: Install SqlPackage
        run: |
          set -euo pipefail
          curl -sSL -o /tmp/sqlpackage.zip https://aka.ms/sqlpackage-linux
          unzip -q /tmp/sqlpackage.zip -d /tmp/sqlpackage
          sudo mv /tmp/sqlpackage/sqlpackage /usr/local/bin/sqlpackage

      - name: Login to Azure
        uses: azure/login@v1
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Set Azure subscription
        run: az account set --subscription ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Resolve core SQL server
        id: sql
        run: |
          set -euo pipefail

          CORE_SERVER=$(az sql server list -g "${{ env.RESOURCE_GROUP }}" \
            --query "[?contains(name, '-core-')].name | [0]" -o tsv)
          CORE_FQDN=$(az sql server list -g "${{ env.RESOURCE_GROUP }}" \
            --query "[?contains(name, '-core-')].fullyQualifiedDomainName | [0]" -o tsv)

          if [ -z "$CORE_SERVER" ] || [ -z "$CORE_FQDN" ]; then
            echo "Could not resolve core SQL server in ${{ env.RESOURCE_GROUP }}."
            exit 1
          fi

          echo "core_server=$CORE_SERVER" >> "$GITHUB_OUTPUT"
          echo "core_fqdn=$CORE_FQDN" >> "$GITHUB_OUTPUT"

      - name: Verify Accounts database exists
        run: |
          set -euo pipefail
          az sql db show \
            --resource-group "${{ env.RESOURCE_GROUP }}" \
            --server "${{ steps.sql.outputs.core_server }}" \
            --name "${{ env.TARGET_DATABASE }}" \
            --output none
          echo "Accounts database exists on ${{ steps.sql.outputs.core_fqdn }}"

      - name: Publish Account Business DACPAC
        env:
          SQL_ADMIN_LOGIN: ${{ secrets.SQL_ADMIN_LOGIN }}
          SQL_ADMIN_PASSWORD: ${{ secrets.SQL_ADMIN_PASSWORD }}
        run: |
          set -euo pipefail

          if [ -z "${SQL_ADMIN_PASSWORD:-}" ]; then
            echo "SQL_ADMIN_PASSWORD is required in the GitHub Environment secrets."
            exit 1
          fi

          LOGIN="${SQL_ADMIN_LOGIN:-vnxadmin}"
          bash database/scripts/publish-dacpac.sh \
            "${{ env.DACPAC_OUTPUT_DIR }}/${{ env.PROJECT_NAME }}.dacpac" \
            "${{ steps.sql.outputs.core_fqdn }}" \
            "${{ env.TARGET_DATABASE }}" \
            "$LOGIN" \
            "$SQL_ADMIN_PASSWORD"

      - name: Publish deployment summary
        run: |
          echo "### Account Business database deployed" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "- Environment: \`${{ github.event.inputs.environment }}\`" >> "$GITHUB_STEP_SUMMARY"
          echo "- Server: \`${{ steps.sql.outputs.core_fqdn }}\`" >> "$GITHUB_STEP_SUMMARY"
          echo "- Database: \`${{ env.TARGET_DATABASE }}\`" >> "$GITHUB_STEP_SUMMARY"
          echo "- DACPAC: \`${{ env.PROJECT_NAME }}.dacpac\`" >> "$GITHUB_STEP_SUMMARY"
