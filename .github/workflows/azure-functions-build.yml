name: Azure Functions Build

on:
  push:
    branches:
      - dev
      - main
  pull_request:
    branches:
      - dev
      - main

jobs:
  build:
    name: Build Azure Functions
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v3
        with:
          dotnet-version: '8.0.x'

      - name: Restore Azure Functions dependencies
        run: dotnet restore backend/src/Functions/VitalNexus.Functions/VitalNexus.Functions.csproj

      - name: Build Azure Functions
        run: dotnet build backend/src/Functions/VitalNexus.Functions/VitalNexus.Functions.csproj --configuration Release --no-restore
