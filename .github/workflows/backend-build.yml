name: Backend Build

on:
  push:
    branches:
      - dev
      - main
  pull_request:
    branches:
      - dev
      - main

jobs:
  build:
    name: Build backend
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      - name: Restore backend solution
        run: dotnet restore backend/VitalNexus.sln

      - name: Build backend solution
        run: dotnet build backend/VitalNexus.sln --configuration Release --no-restore
