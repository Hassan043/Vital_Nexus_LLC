name: Identity Infrastructure Build

on:
  pull_request:
    paths:
      - 'infra/identity/**'
      - 'scripts/b2c/**'
      - 'scripts/register-b2c-spa-app.ps1'
      - 'scripts/verify-b2c-spa-app.ps1'
      - 'scripts/register-b2c-api-app.ps1'
      - 'scripts/verify-b2c-api-app.ps1'
      - 'scripts/configure-b2c-signup-signin-flow.ps1'
      - 'scripts/verify-b2c-user-flow.ps1'
      - 'scripts/configure-b2c-auth-branding.ps1'
      - 'scripts/verify-b2c-auth-branding.ps1'
      - 'scripts/configure-b2c-password-recovery.ps1'
      - 'scripts/verify-b2c-password-recovery.ps1'
      - '.github/workflows/identity-build.yml'
      - '.github/workflows/configure-b2c-spa-app.yml'
      - '.github/workflows/configure-b2c-api-app.yml'
      - '.github/workflows/configure-b2c-user-flow.yml'
      - '.github/workflows/configure-b2c-auth-branding.yml'
      - '.github/workflows/configure-b2c-password-recovery.yml'
  push:
    branches:
      - dev
      - main
    paths:
      - 'infra/identity/**'
      - 'scripts/b2c/**'
      - 'scripts/register-b2c-spa-app.ps1'
      - 'scripts/verify-b2c-spa-app.ps1'
      - 'scripts/register-b2c-api-app.ps1'
      - 'scripts/verify-b2c-api-app.ps1'
      - 'scripts/configure-b2c-signup-signin-flow.ps1'
      - 'scripts/verify-b2c-user-flow.ps1'
      - 'scripts/configure-b2c-auth-branding.ps1'
      - 'scripts/verify-b2c-auth-branding.ps1'
      - 'scripts/configure-b2c-password-recovery.ps1'
      - 'scripts/verify-b2c-password-recovery.ps1'
      - '.github/workflows/identity-build.yml'
      - '.github/workflows/configure-b2c-spa-app.yml'
      - '.github/workflows/configure-b2c-api-app.yml'
      - '.github/workflows/configure-b2c-user-flow.yml'
      - '.github/workflows/configure-b2c-auth-branding.yml'
      - '.github/workflows/configure-b2c-password-recovery.yml'
  workflow_dispatch:

permissions:
  contents: read

jobs:
  bicep-build:
    name: Validate identity Bicep
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Build identity Bicep templates
        run: |
          set -euo pipefail
          az bicep build --file infra/identity/main.bicep
          az bicep build --file infra/identity/modules/b2c-tenant.bicep
          az bicep build --file infra/identity/modules/key-vault-tenant-secret.bicep

      - name: Validate SPA app environment config
        shell: pwsh
        run: |
          $config = Get-Content infra/identity/spa-app/environments.json -Raw | ConvertFrom-Json
          foreach ($envName in @('dev', 'test', 'prod')) {
            if (-not $config.$envName.displayName) {
              throw "spa-app/environments.json missing displayName for $envName"
            }
            if (-not $config.$envName.redirectUris -or $config.$envName.redirectUris.Count -eq 0) {
              throw "spa-app/environments.json missing redirectUris for $envName"
            }
          }
          Write-Host "spa-app/environments.json is valid."

      - name: Validate API app environment config
        shell: pwsh
        run: |
          $config = Get-Content infra/identity/api-app/environments.json -Raw | ConvertFrom-Json
          foreach ($envName in @('dev', 'test', 'prod')) {
            if (-not $config.$envName.displayName) {
              throw "api-app/environments.json missing displayName for $envName"
            }
            if (-not $config.$envName.tenantDomainPrefix) {
              throw "api-app/environments.json missing tenantDomainPrefix for $envName"
            }
            if (-not $config.$envName.scopes -or $config.$envName.scopes.Count -eq 0) {
              throw "api-app/environments.json missing scopes for $envName"
            }
          }
          Write-Host "api-app/environments.json is valid."

      - name: Validate user flow environment config
        shell: pwsh
        run: |
          $config = Get-Content infra/identity/user-flows/environments.json -Raw | ConvertFrom-Json
          foreach ($envName in @('dev', 'test', 'prod')) {
            if (-not $config.$envName.tenantDomainPrefix) {
              throw "user-flows/environments.json missing tenantDomainPrefix for $envName"
            }
            if (-not $config.$envName.userFlowId) {
              throw "user-flows/environments.json missing userFlowId for $envName"
            }
          }
          Get-Content infra/identity/user-flows/signup-signin.flow.json -Raw | ConvertFrom-Json | Out-Null
          Write-Host "user-flows configuration is valid."

      - name: Validate branding environment config
        shell: pwsh
        run: |
          $config = Get-Content infra/identity/branding/environments.json -Raw | ConvertFrom-Json
          foreach ($envName in @('dev', 'test', 'prod')) {
            if (-not $config.$envName.backgroundColor) {
              throw "branding/environments.json missing backgroundColor for $envName"
            }
            if (-not $config.$envName.contentCustomization.SignIn_Title) {
              throw "branding/environments.json missing contentCustomization.SignIn_Title for $envName"
            }
          }
          Write-Host "branding/environments.json is valid."

      - name: Validate password recovery environment config
        shell: pwsh
        run: |
          $config = Get-Content infra/identity/password-recovery/environments.json -Raw | ConvertFrom-Json
          foreach ($envName in @('dev', 'test', 'prod')) {
            if (-not $config.$envName.passwordResetUserFlowId) {
              throw "password-recovery/environments.json missing passwordResetUserFlowId for $envName"
            }
          }
          Get-Content infra/identity/password-recovery/password-reset.b2c.flow.json -Raw | ConvertFrom-Json | Out-Null
          Write-Host "password-recovery configuration is valid."
