name: Deploy Infrastructure

on:
  workflow_dispatch:
    inputs:
      environment:
        description: Target environment for infrastructure deployment
        required: true
        default: dev
        type: choice
        options:
          - dev
          - test
          - prod

permissions:
  contents: read

jobs:
  deploy:
    name: Deploy infra to ${{ github.event.inputs.environment }}
    runs-on: ubuntu-latest
    environment: ${{ github.event.inputs.environment }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Login to Azure
        uses: azure/login@v1
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Set Azure subscription
        run: az account set --subscription ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Ensure resource group exists
        env:
          AZURE_LOCATION: ${{ vars.AZURE_LOCATION }}
        run: |
          set -euo pipefail
          rg="rg-vitalnexus-${{ github.event.inputs.environment }}"
          location="${AZURE_LOCATION:-eastus}"
          if ! az group show --name "$rg" >/dev/null 2>&1; then
            echo "Creating resource group $rg in $location"
            az group create --name "$rg" --location "$location"
          else
            echo "Resource group $rg already exists"
          fi

      - name: Deploy Bicep infrastructure
        env:
          SQL_ADMIN_LOGIN: ${{ secrets.SQL_ADMIN_LOGIN }}
          SQL_ADMIN_PASSWORD: ${{ secrets.SQL_ADMIN_PASSWORD }}
        run: |
          set -euo pipefail

          if [ -z "${SQL_ADMIN_PASSWORD:-}" ]; then
            echo "SQL_ADMIN_PASSWORD is required in the GitHub Environment secrets."
            exit 1
          fi

          envFile="infra/main.${{ github.event.inputs.environment }}.bicepparam"
          if [ ! -f "$envFile" ]; then
            echo "Parameter file $envFile not found"
            exit 1
          fi

          rg="rg-vitalnexus-${{ github.event.inputs.environment }}"
          az deployment group create \
            --resource-group "$rg" \
            --template-file infra/main.bicep \
            --parameters "$envFile"
