name: Deploy Databases

on:
  workflow_dispatch:
    inputs:
      environment:
        description: Target environment
        required: true
        type: choice
        options:
          - dev
          - test
          - prod

env:
  RESOURCE_GROUP: rg-vitalnexus-${{ github.event.inputs.environment }}
  SQL_PROJECTS: |
    database/VitalNexus.AccountBusiness.Database/VitalNexus.AccountBusiness.Database.sqlproj|Accounts|core
    database/VitalNexus.LabMarkersData.Database/VitalNexus.LabMarkersData.Database.sqlproj|LabMarkersData|core
    database/VitalNexus.PatientHealth.Database/VitalNexus.PatientHealth.Database.sqlproj|PatientHealth|phi

jobs:
  deploy:
    name: Deploy databases to ${{ github.event.inputs.environment }}
    runs-on: ubuntu-latest
    environment: ${{ github.event.inputs.environment }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup .NET SDK
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      - name: Build SQL Database Projects
        run: |
          set -euo pipefail

          while IFS='|' read -r project _ _; do
            [ -z "$project" ] && continue
            dotnet build "$project" --configuration Release
          done <<< "${{ env.SQL_PROJECTS }}"

      - name: Install SqlPackage
        run: |
          set -euo pipefail
          curl -sSL -o /tmp/sqlpackage.zip https://aka.ms/sqlpackage-linux
          unzip -q /tmp/sqlpackage.zip -d /tmp/sqlpackage
          sudo mv /tmp/sqlpackage/sqlpackage /usr/local/bin/sqlpackage

      - name: Login to Azure
        uses: azure/login@v1
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Set Azure subscription
        run: az account set --subscription ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Resolve SQL servers
        id: sql
        run: |
          set -euo pipefail

          CORE_FQDN=$(az sql server list -g "${{ env.RESOURCE_GROUP }}" \
            --query "[?contains(name, '-core-')].fullyQualifiedDomainName | [0]" -o tsv)
          PHI_FQDN=$(az sql server list -g "${{ env.RESOURCE_GROUP }}" \
            --query "[?contains(name, '-phi-')].fullyQualifiedDomainName | [0]" -o tsv)

          if [ -z "$CORE_FQDN" ] || [ -z "$PHI_FQDN" ]; then
            echo "Could not resolve core/phi SQL servers in ${{ env.RESOURCE_GROUP }}."
            exit 1
          fi

          echo "core_fqdn=$CORE_FQDN" >> "$GITHUB_OUTPUT"
          echo "phi_fqdn=$PHI_FQDN" >> "$GITHUB_OUTPUT"

      - name: Publish DACPACs with SqlPackage
        env:
          SQL_ADMIN_LOGIN: ${{ secrets.SQL_ADMIN_LOGIN }}
          SQL_ADMIN_PASSWORD: ${{ secrets.SQL_ADMIN_PASSWORD }}
        run: |
          set -euo pipefail

          if [ -z "${SQL_ADMIN_PASSWORD:-}" ]; then
            echo "SQL_ADMIN_PASSWORD is required in the GitHub Environment secrets."
            exit 1
          fi

          LOGIN="${SQL_ADMIN_LOGIN:-vnxadmin}"

          while IFS='|' read -r project database_name server_role; do
            [ -z "$project" ] && continue

            if [ "$server_role" = "core" ]; then
              SERVER_FQDN="${{ steps.sql.outputs.core_fqdn }}"
            else
              SERVER_FQDN="${{ steps.sql.outputs.phi_fqdn }}"
            fi

            dacpac=$(find "$(dirname "$project")/bin/Release" -name '*.dacpac' -print -quit)
            if [ -z "$dacpac" ]; then
              echo "DACPAC not found for $project"
              exit 1
            fi

            echo "Publishing $database_name to $SERVER_FQDN"
            sqlpackage /Action:Publish \
              /SourceFile:"$dacpac" \
              /TargetServerName:"$SERVER_FQDN" \
              /TargetDatabaseName:"$database_name" \
              /TargetUser:"$LOGIN" \
              /TargetPassword:"$SQL_ADMIN_PASSWORD" \
              /BlockOnPossibleDataLoss:True
          done <<< "${{ env.SQL_PROJECTS }}"
